# --- HYPRLAND LIVE CONFIG ---

# 1. MONITORS
monitor=,preferred,auto,1

# 2. PROGRAMS
$terminal = kitty
$fileManager = kitty -e yazi
$menu = rofi -show drun
$browser = flatpak run app.zen_browser.zen

# 3. AUTOSTART
exec-once = waybar & nm-applet & dunst & hyprpaper

# 4. LOOK & FEEL
general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    
    # Catppuccin Macchiato Colors
    # Active: Mauve (c6a0f6) to Teal (8bd5ca)
    col.active_border = rgba(c6a0f6ee) rgba(8bd5caee) 45deg
    # Inactive: Surface2 (5b6078)
    col.inactive_border = rgba(5b6078aa)
    
    layout = dwindle
}

decoration {
    rounding = 10
    
    # Soft Macchiato Shadow (Crust color)
    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(181926ee)
    }

    blur {
        enabled = true 
        size = 3
        passes = 1
    }
}

# 5. KEYBINDS
$mainMod = SUPER
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, V, togglefloating,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, B, exec, $browser

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
# ... add more as needed

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# 6. RULES
windowrule {
    name = suppress-maximize
    match:class = .*
    suppress_event = maximize
}